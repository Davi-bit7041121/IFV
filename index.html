<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IFV Analyzer</title>

<style>

body{
font-family:system-ui;
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
background:#334155;
color:white;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #334155;
}

th{
color:#94a3b8;
}

</style>

</head>

<body>

<div class="card">

<h2>IFV Analyzer</h2>

<input id="ticker" placeholder="Ticker (ex: PETR4)">
<input id="roe" placeholder="ROE (%)">
<input id="pl" placeholder="P/L">
<input id="pvp" placeholder="P/VP">
<input id="peg" placeholder="PEG">
<input id="dy" placeholder="Dividend Yield (%)">
<input id="divida" placeholder="Dívida/EBITDA">

<button onclick="calcular()">Calcular IFV</button>

<div id="resultado"></div>

</div>

<div class="card">

<h3>Ranking de Ações</h3>

<table id="ranking">

<tr>
<th>Empresa</th>
<th>IFV</th>
<th>Classificação</th>
</tr>

</table>

</div>

<script>

let ranking = JSON.parse(localStorage.getItem("rankingIFV")) || []

function classificar(ifv){

if(ifv >= 4.5) return "extraordinária"
if(ifv >= 3.5) return "muito boa"
if(ifv >= 2.5) return "razoável"
if(ifv >= 1.5) return "cara"
return "muito cara"

}if(ifv>=4.5) return "Excelente"
if(ifv>=3.5) return "Boa"
if(ifv>=2.5) return "Média"
return "Ruim"

}

function scoreROE(v){
if(v<5)return 1
if(v<10)return 2
if(v<15)return 3
if(v<25)return 4
return 5
}

function scorePL(v){
if(v>30)return 1
if(v>20)return 2
if(v>12)return 3
if(v>6)return 4
return 5
}

function scorePVP(v){
if(v>3)return 1
if(v>2)return 2
if(v>1)return 3
if(v>0.7)return 4
return 5
}

function scorePEG(v){
if(v>2)return 1
if(v>1.5)return 2
if(v>1)return 3
if(v>0.5)return 4
return 5
}

function scoreDY(v){
if(v<2)return 1
if(v<4)return 2
if(v<6)return 3
if(v<10)return 4
return 5
}

function scoreDivida(v){
if(v>4)return 1
if(v>3)return 2
if(v>2)return 3
if(v>1)return 4
return 5
}

function calcular(){

let ticker=document.getElementById("ticker").value.toUpperCase()

let roe=parseFloat(document.getElementById("roe").value)
let pl=parseFloat(document.getElementById("pl").value)
let pvp=parseFloat(document.getElementById("pvp").value)
let peg=parseFloat(document.getElementById("peg").value)
let dy=parseFloat(document.getElementById("dy").value)
let divida=parseFloat(document.getElementById("divida").value)

let s1=scoreROE(roe)
let s2=scorePL(pl)
let s3=scorePVP(pvp)
let s4=scorePEG(peg)
let s5=scoreDY(dy)
let s6=scoreDivida(divida)

let ifv=(s1+s2+s3+s4+s5+s6)/6

let classificacao=classificar(ifv)

document.getElementById("resultado").innerHTML=
ticker+" → IFV: "+ifv.toFixed(2)+" | "+classificacao

let index = ranking.findIndex(r=>r.ticker===ticker)

if(index>=0){

ranking[index].ifv = ifv
ranking[index].classificacao = classificacao

}else{

ranking.push({ticker,ifv,classificacao})

}

ranking.sort((a,b)=>b.ifv-a.ifv)

localStorage.setItem("rankingIFV",JSON.stringify(ranking))

render()

}

function render(){

let tabela=document.getElementById("ranking")

tabela.innerHTML="<tr><th>Empresa</th><th>IFV</th><th>Classificação</th></tr>"

ranking.forEach(r=>{

tabela.innerHTML+=
`<tr>
<td>${r.ticker}</td>
<td>${r.ifv.toFixed(2)}</td>
<td>${r.classificacao}</td>
</tr>`

})

}

render()

</script>

</body>
</html>
